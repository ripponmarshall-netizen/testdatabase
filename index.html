<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JFB Union Platform</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect } = React;

/* ================= RESPONSIVE ================= */
function useWindowWidth(){
  const [w,setW]=useState(window.innerWidth);
  useEffect(()=>{
    const h=()=>setW(window.innerWidth);
    window.addEventListener("resize",h);
    return()=>window.removeEventListener("resize",h);
  },[]);
  return w;
}

/* ================= MOCK ================= */
const MEMBERS = [
{id:"M001",name:"Rippon Marshall",rank:"Lance Corporal",status:"active"},
{id:"M002",name:"Devon Campbell",rank:"Station Officer",status:"active"},
{id:"M003",name:"Andre Williams",rank:"Firefighter",status:"suspended"}
];

const USER_ACCOUNTS = [
{id:"U1",member_id:"M001",email:"r.marshall@jfb.gov.jm",role:"member",password:"member123"},
{id:"U2",member_id:"M002",email:"d.campbell@jfb.gov.jm",role:"exec",password:"exec123"},
];

const SEED_NOTES = [
{id:"N1",member_id:"M003",author_id:"U2",category:"disciplinary",title:"Suspension Case",body:"Violation of protocol",is_confidential:true,created_at:"2025-04-01"}
];

/* ================= STYLES ================= */
const T={
bg:"#f7f6f4", surface:"#fff", border:"#e4e2de",
text:"#1a1917", muted:"#6b6860", accent:"#1d4ed8",
sidebar:"#141412", sidebarText:"#d6d4d0"
};

/* ================= COMPONENTS ================= */
function Btn({children,onClick}){
  return <button onClick={onClick} style={{padding:"6px 12px",cursor:"pointer"}}>{children}</button>;
}

function Card({children}){
  return <div style={{background:"#fff",padding:16,border:"1px solid #ddd",marginBottom:10}}>{children}</div>;
}

/* ================= LOGIN ================= */
function Login({onLogin}){
  const [email,setEmail]=useState("");
  const [pw,setPw]=useState("");

  return(
    <div style={{padding:40}}>
      <h2>Login</h2>
      <input placeholder="email" onChange={e=>setEmail(e.target.value)} /><br/><br/>
      <input placeholder="password" type="password" onChange={e=>setPw(e.target.value)} /><br/><br/>
      <Btn onClick={()=>{
        const u=USER_ACCOUNTS.find(x=>x.email===email && x.password===pw);
        if(u) onLogin(u);
        else alert("invalid");
      }}>Login</Btn>
    </div>
  );
}

/* ================= SIDEBAR ================= */
function Sidebar({collapsed,toggle,isMobile,mobileOpen,onClose,page,setPage}){
  const width = collapsed ? 70 : 220;

  return(
    <>
    {isMobile && mobileOpen && (
      <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)"}}/>
    )}

    <div style={{
      position:"fixed",
      left:0,top:0,bottom:0,
      width,
      background:T.sidebar,
      color:"#fff",
      transform:isMobile ? (mobileOpen?"translateX(0)":"translateX(-100%)"):"none",
      transition:"0.2s"
    }}>
      <div style={{padding:10}}>
        <Btn onClick={toggle}>{collapsed?"➡":"⬅"}</Btn>
      </div>

      {["dashboard","members"].map(k=>(
        <div key={k}
          onClick={()=>{setPage(k); if(isMobile)onClose();}}
          style={{padding:10,cursor:"pointer",color:T.sidebarText}}>
          {!collapsed && k}
        </div>
      ))}
    </div>
    </>
  );
}

/* ================= NOTES PANEL ================= */
function NotesPanel({memberId,currentUser,notes,setNotes}){
  const [text,setText]=useState("");

  const filtered = notes.filter(n=>{
    if(n.member_id!==memberId) return false;
    if(currentUser.role==="exec") return true;
    return !n.is_confidential;
  });

  return(
    <Card>
      <h3>Notes</h3>

      {currentUser.role!=="exec" && (
        <p style={{fontSize:12,color:"#888"}}>
          Some executive notes are restricted.
        </p>
      )}

      {filtered.map(n=>(
        <div key={n.id} style={{marginBottom:8}}>
          <b>{n.title}</b>
          <p>{n.body}</p>
        </div>
      ))}

      {currentUser.role==="exec" && (
        <>
          <input value={text} onChange={e=>setText(e.target.value)} placeholder="Add note"/>
          <Btn onClick={()=>{
            setNotes([...notes,{
              id:Date.now(),
              member_id:memberId,
              title:"New Note",
              body:text,
              is_confidential:false
            }]);
            setText("");
          }}>Add</Btn>
        </>
      )}
    </Card>
  );
}

/* ================= MAIN ================= */
function App(){
  const [user,setUser]=useState(null);
  const [page,setPage]=useState("dashboard");
  const [collapsed,setCollapsed]=useState(false);
  const [mobileOpen,setMobileOpen]=useState(false);
  const [notes,setNotes]=useState(SEED_NOTES);

  const width = useWindowWidth();
  const isMobile = width < 768;

  if(!user) return <Login onLogin={setUser}/>;

  return(
    <div style={{display:"flex"}}>
      <Sidebar
        collapsed={collapsed}
        toggle={()=>setCollapsed(p=>!p)}
        isMobile={isMobile}
        mobileOpen={mobileOpen}
        onClose={()=>setMobileOpen(false)}
        page={page}
        setPage={setPage}
      />

      <div style={{
        marginLeft:isMobile?0:(collapsed?70:220),
        width:"100%"
      }}>
        <div style={{padding:10,background:"#fff",borderBottom:"1px solid #ddd"}}>
          {isMobile && <Btn onClick={()=>setMobileOpen(p=>!p)}>☰</Btn>}
          <Btn onClick={()=>setUser(null)}>Logout</Btn>
        </div>

        <div style={{padding:20}}>
          {page==="dashboard" && <h2>Dashboard</h2>}

          {page==="members" && MEMBERS.map(m=>(
            <Card key={m.id}>
              <h3>{m.name}</h3>
              <NotesPanel
                memberId={m.id}
                currentUser={user}
                notes={notes}
                setNotes={setNotes}
              />
            </Card>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
